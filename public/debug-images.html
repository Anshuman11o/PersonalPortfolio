<!DOCTYPE html>
<html>
<head><title>Image Debug</title></head>
<body>
<h1>Image Loading Test</h1>
<p>Testing if images load directly:</p>
<img src="/test-working-image.png" width="100" alt="Working test" style="border: 2px solid green;">
<br><br>
<img src="/test-can-we-see-this.jpeg" width="100" alt="Profile test" style="border: 2px solid red;">
<br><br>
<img src="/test-iomics.jpeg" width="100" alt="Logo test" style="border: 2px solid blue;">
<br><br>
<img src="/cooking-inventory-1.png" width="100" alt="Known working" style="border: 2px solid purple;">
<script>
window.addEventListener('load', function() {
  const images = document.querySelectorAll('img');
  images.forEach((img, index) => {
    img.onerror = function() {
      this.style.border = '2px solid red';
      this.alt = this.alt + ' - FAILED TO LOAD';
    };
    img.onload = function() {
      this.style.border = '2px solid green';
      this.alt = this.alt + ' - LOADED OK';
    };
  });
});
</script>
</body>
</html>
